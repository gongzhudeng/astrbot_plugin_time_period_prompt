name: 灵犀 · 陪伴节律助手
desc: >
  让 AI 根据你的工作、休息、日期时间和生活节律调整陪伴方式。
  支持双休、单休、大小周、无休、自定义工作星期、临时休息日/工作日、
  日期时间提示、精确到分钟的时间段规则、时段交接模糊区间、今日附加提示等功能。
help: |
  陪伴节律助手会读取运行 AstrBot 的电脑当前时间，
  根据你的工作制度、临时休息日、临时工作日、日期时间提示、今日附加提示和时间段规则，
  自动注入对应的陪伴状态提示。

  主要功能：
  - 区分工作日和休息日
  - 支持双休、单休、大小周、无休、自定义工作星期
  - 支持临时休息日和临时工作日
  - 支持今日状态锁定
  - 支持日期时间提示
  - 支持精确到分钟的当前时间提示
  - 支持工作日时间段规则
  - 支持休息日时间段规则
  - 支持时段交接模糊区间
  - 支持刚进入时段提示
  - 支持快结束时段提示
  - 支持今日附加提示
  - 支持自定义注入顺序
  - 支持聊天命令实时调整节律提示
  - 支持 /节律状态 查看当前判断结果
  - 支持调试日志

  常用命令：
  /节律状态
  /节律帮助
  /节律今日 内容
  /节律风格 内容
  /节律今日清空
  /节律今日到期 2026-06-12
  /节律锁定 自动
  /节律锁定 工作日
  /节律锁定 休息日
  /节律状态提示 工作日 内容
  /节律状态提示 休息日 内容
  /节律状态提示清空 工作日
  /节律状态提示清空 休息日
  /节律时间 关闭
  /节律时间 年月日
  /节律时间 年月
  /节律时间 月初中下旬
  /节律时间 仅时间
  /节律时间 日期和时间
  /节律调试 开
  /节律调试 关
  /节律改时段 内容

  时间段格式示例：
  09:00-12:00
  12:00-14:00
  18:30-23:00
  19:30-08:29

  注入顺序可用名称：
  状态提示
  今日附加提示
  日期时间提示
  交接提示
  时段提示词

  默认注入顺序：
  状态提示,今日附加提示,日期时间提示,交接提示,时段提示词
version: v2.9.0
author: 灵犀
